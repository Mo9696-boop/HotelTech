<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HotelTech 360</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --bg:#f5f3ef;--surface:#ffffff;--surface2:#fafaf8;
  --ink:#1a2332;--ink2:#4a5568;--muted:#8b8578;--line:#e8e2d8;
  --gold:#b8965a;--gold2:#f5eed8;
  --red:#c0392b;--red2:#fdf0ee;
  --green:#27634f;--green2:#eaf3ee;
  --orange:#d97706;--orange2:#fef3e2;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --sh1:0 1px 3px rgba(26,35,50,.08),0 1px 2px rgba(26,35,50,.05);
  --sh2:0 4px 12px rgba(26,35,50,.10),0 2px 4px rgba(26,35,50,.06);
  --sh3:0 12px 32px rgba(26,35,50,.14),0 4px 8px rgba(26,35,50,.08);
  --r:12px;--r2:8px;--nav:68px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:var(--sans);color:var(--ink)}
button,input,textarea,select{font-family:var(--sans);cursor:pointer}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.pulse{animation:pulse 2s infinite}
.fade-in{animation:fadeIn .3s ease both}
.skel{background:linear-gradient(90deg,var(--line) 25%,#f0ebe0 50%,var(--line) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
@media print{.no-print{display:none!important}body{background:#fff;margin:0}@page{margin:12mm;size:A4}}
.print-only{display:none}
body.printing *{visibility:hidden!important}
body.printing #parea,body.printing #parea *{visibility:visible!important}
body.printing #parea{position:fixed;top:0;left:0;width:100%;min-height:100vh;z-index:99999;background:#fff;overflow:auto;display:block!important}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

// ═══ CONFIG ═══════════════════════════════════════════════
const PIN="2612";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzmBGpd_x3PAH1OS_9z06ZElT3rA74vNvVoNTgEyE6N-2QfJ6GmrtKoRMjhMssXMOz2sQ/exec";
const SHEET_URL="https://docs.google.com/spreadsheets/d/1CgPrW3VqSAp_fp-G-a6vLA8TasK7mWGMxp94kLET_QI/edit?usp=sharing";

// ═══ CHECKLIST ════════════════════════════════════════════
const SECTIONS=[
  {id:"entree",label:"Entrée",num:"I",items:[
    {id:"e1",label:"Piles de la serrure"},{id:"e2",label:"Présence de courant"},
    {id:"e3",label:"Prises et interrupteurs bien fixées"},{id:"e4",label:"Caches présents"},
    {id:"e5",label:"Lumières fonctionnent"},{id:"e6",label:"Poignées et serrures des portes"},
  ]},
  {id:"chambre",label:"Chambre",num:"II",items:[
    {id:"c1",label:"Présence de courant"},{id:"c2",label:"Prises et interrupteurs bien fixées"},
    {id:"c3",label:"Caches présents"},{id:"c4",label:"Lumières fonctionnent"},
    {id:"c5",label:"Ventilo-convecteur fonctionne",hasTemp:true},
    {id:"c6",label:"Nettoyer filtre, bouches d'air & bac à condensation VC"},
    {id:"c7",label:"Désinfecter la batterie du VC"},{id:"c8",label:"Coffre ouvert et piles Ok"},
    {id:"c9",label:"TV fonctionne bien et piles Ok"},{id:"c10",label:"Tonalité du téléphone"},
    {id:"c11",label:"Paumelles et poignées des fenêtres"},{id:"c12",label:"Tringle et rideaux"},
  ]},
  {id:"sdb",label:"Salle de bain",num:"III",items:[
    {id:"s1",label:"Présence de courant"},{id:"s2",label:"Prises et interrupteurs bien fixées"},
    {id:"s3",label:"Caches présents"},{id:"s4",label:"Lumières fonctionnent"},
    {id:"s5",label:"Joints de silicone"},{id:"s6",label:"Joints plastiques"},
    {id:"s7",label:"Absence de fuite (chasse, douche, lavabos)"},{id:"s8",label:"Abattant des toilettes"},
    {id:"s9",label:"Robinetterie"},{id:"s10",label:"Porte-savon"},
    {id:"s11",label:"Tablettes et portes peignoirs"},{id:"s12",label:"Bouches des VMC"},
    {id:"s13",label:"Pommeaux de douche"},{id:"s14",label:"Vannes d'arrivées d'eaux"},
  ]}
];
const ALL=SECTIONS.flatMap(s=>s.items);
const TOTAL=ALL.length;
const PRIOS=[
  {id:'critique',label:'Critique',color:'var(--red)',bg:'var(--red2)'},
  {id:'moyen',label:'Moyen',color:'var(--orange)',bg:'var(--orange2)'},
  {id:'faible',label:'Faible',color:'var(--green)',bg:'var(--green2)'},
];

// ═══ STORAGE ══════════════════════════════════════════════
const ls={
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}},
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}},
  del:k=>{try{localStorage.removeItem(k)}catch(e){}},
  keys:p=>{try{return Object.keys(localStorage).filter(k=>k.startsWith(p))}catch(e){return[]}},
};

// ═══ REMOTE SYNC ══════════════════════════════════════════
let _remote=[];
let _currentInsp=null;
let _inspMap={};
function fetchRemote(cb){
  if(!SCRIPT_URL){cb([]);return;}
  const name='_ht360s'+Date.now();
  const sc=document.createElement('script');
  let done=false;
  const cleanup=()=>{try{document.body.removeChild(sc)}catch(e){}delete window[name];};
  window[name]=rows=>{
    done=true;
    _remote=Array.isArray(rows)?rows:[];
    _remote.forEach(function(r){
      if(r.date&&r.date.length>10){try{r.date=new Date(r.date).toISOString().split('T')[0];}catch(e){}}
      r.id='sh_'+(r.hotel||'').replace(/\s/g,'')+'_'+(r.room||'')+'_'+(r.date||'').replace(/[^0-9]/g,'');
      if(r.checks&&typeof r.checks==='string'){try{r.checks=JSON.parse(r.checks);}catch(e){r.checks={};}}
      else if(!r.checks){r.checks={};}
    });
    cleanup();cb(_remote);
  };
  sc.onerror=()=>{if(!done){done=true;cleanup();cb([])}};
  sc.src=SCRIPT_URL+'?action=getAll&callback='+name;
  document.body.appendChild(sc);
  setTimeout(()=>{if(!done){done=true;cleanup();cb([])}},7000);
}
function merged(){
  // Si le Sheet est chargé → uniquement ses données (source de vérité)
  // Si hors-ligne (remote vide) → fallback local
  var base=_remote.length>0
    ?_remote.slice()
    :ls.keys('ht:').filter(function(k){return k!=='ht:lastTech';}).map(function(k){return ls.get(k);}).filter(Boolean);
  base.sort(function(a,b){
    if(b.ts&&a.ts)return b.ts-a.ts;
    return(b.date+(b.heure||'')).localeCompare(a.date+(a.heure||''));
  });
  base.forEach(function(i){if(i&&i.id)_inspMap[i.id]=i;});
  return base;
}

// ═══ SHEET ════════════════════════════════════════════════
function sheetPayload(insp,action){
  const o={tech:insp.tech,hotel:insp.hotel,room:insp.room,controlled:insp.controlled,
    problems:insp.problems&&insp.problems!=='Aucun'?fmtProblems(insp.problems):insp.problems||'Aucun',comments:insp.comments||'',date:insp.date,
    heure:insp.ts?new Date(insp.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'',
    priority:insp.priority||'',
    resolved:insp.resolved?'Oui':'Non',
    resolvedAt:insp.resolvedAt?new Date(insp.resolvedAt).toLocaleString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'',
    resolvedBy:insp.resolvedBy||'',
    checks:JSON.stringify(insp.checks||{})};
  if(action)o.action=action;return o;
}
function sendToSheet(data){
  if(!SCRIPT_URL)return;
  const img=new Image();img.src=SCRIPT_URL+'?payload='+encodeURIComponent(JSON.stringify(data));
}
function testConnection(){
  window.open(SCRIPT_URL+'?payload='+encodeURIComponent(JSON.stringify({tech:'TEST',hotel:'TEST',room:'000',controlled:'oui',problems:'Aucun',comments:'Test',date:today(),heure:'00:00'})),'_blank');
}

// ═══ UTILS ════════════════════════════════════════════════
const today=()=>new Date().toISOString().split('T')[0];
const fmtD=iso=>iso?new Date(iso+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';
const fmtT=ts=>new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const qr=d=>`https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(d)}&size=200x200&margin=8&color=1a2332&bgcolor=ffffff`;
const fmtDur=ms=>{if(!ms||ms<0)return'';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);if(h>=48)return Math.floor(h/24)+'j';if(h>0)return h+'h'+(m>0?m+'min':'');return m>0?m+' min':'< 1 min';};
const fmtProblems=p=>p?p.split(' · ').map(s=>s.startsWith('✗ ')?s:'✗ '+s).join(' · '):'';
const floorOf=room=>{const n=parseInt(room);if(isNaN(n)||n<100)return'RDC';return Math.floor(n/100)+'e étage';};
const pInfo=id=>PRIOS.find(p=>p.id===id)||null;

// ═══ APP ══════════════════════════════════════════════════
function App(){
  const[view,setV]=useState('dash');
  const[params,setP]=useState(null);
  const[iid,setIid]=useState(null);
  const[ok,setOk]=useState(sessionStorage.getItem('ht360ok')==='1');
  useEffect(()=>{
    const go=()=>{
      const h=location.hash.replace('#','');
      if(h.startsWith('/check/')){const p=h.split('/');setP({hotel:decodeURIComponent(p[2]),room:decodeURIComponent(p[3])});setV('form');}
      else if(h.startsWith('/i/')){setIid(h.split('/')[2]);setV('detail');}
      else if(h.startsWith('/edit/')){setIid(h.split('/')[2]);setV('edit');}
      else if(h==='/qr')setV('qr');
      else if(h==='/hist')setV('hist');
      else if(h==='/analytics')setV('analytics');
      else if(h==='/cfg')setV('cfg');
      else setV('dash');
    };
    go();addEventListener('hashchange',go);return()=>removeEventListener('hashchange',go);
  },[]);
  const nav=p=>location.hash=p;
  const full=view==='form'||view==='detail'||view==='edit'||view==='qr';
  if(!ok)return<PinGate onOk={()=>{sessionStorage.setItem('ht360ok','1');setOk(true)}}/>;
  return(
    <div style={{minHeight:'100vh',paddingBottom:full?0:'var(--nav)'}}>
      {view==='dash'&&<DashView nav={nav}/>}
      {view==='form'&&<FormView p={params} nav={nav}/>}
      {view==='hist'&&<HistView nav={nav}/>}
      {view==='detail'&&<DetailView id={iid} nav={nav}/>}
      {view==='edit'&&<EditView id={iid} nav={nav}/>}
      {view==='qr'&&<QRView nav={nav}/>}
      {view==='analytics'&&<AnalyticsView nav={nav}/>}
      {view==='cfg'&&<CfgView nav={nav}/>}
      {!full&&<BottomNav active={view} nav={nav}/>}
    </div>
  );
}

// ═══ BOTTOM NAV ═══════════════════════════════════════════
function BottomNav({active,nav}){
  const items=[
    {id:'dash',icon:'⌂',label:'Accueil',href:'/'},
    {id:'hist',icon:'☰',label:'Historique',href:'/hist'},
    {id:'form',icon:'+',label:'Nouveau',href:'/check/Novotel/--',fab:true},
    {id:'analytics',icon:'◑',label:'Analyses',href:'/analytics'},
    {id:'cfg',icon:'⚙',label:'Réglages',href:'/cfg'},
  ];
  return(
    <div className="no-print" style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,height:'var(--nav)',background:'var(--surface)',borderTop:'1px solid var(--line)',display:'flex',alignItems:'stretch',zIndex:100,boxShadow:'0 -4px 20px rgba(26,35,50,.08)'}}>
      {items.map(item=>(
        <button key={item.id} onClick={()=>nav(item.href)}
          style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,background:'transparent',border:'none',color:active===item.id?'var(--ink)':'var(--muted)',padding:'8px 4px',position:'relative',transition:'color .2s'}}>
          {item.fab
            ?<div style={{width:50,height:50,borderRadius:'50%',background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:28,fontWeight:300,marginTop:-22,boxShadow:'var(--sh3)'}}>+</div>
            :<span style={{fontSize:21,lineHeight:1}}>{item.icon}</span>
          }
          <span style={{fontSize:9,fontWeight:active===item.id?600:400,letterSpacing:'.05em',textTransform:'uppercase'}}>{item.label}</span>
          {active===item.id&&!item.fab&&<div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:28,height:2,background:'var(--ink)',borderRadius:1}}/>}
        </button>
      ))}
    </div>
  );
}

// ═══ PIN ══════════════════════════════════════════════════
function PinGate({onOk}){
  const[pin,setPin]=useState('');const[err,setErr]=useState(false);const[sh,setSh]=useState(false);
  const press=k=>{if(pin.length>=4)return;const n=pin+k;setPin(n);setErr(false);if(n.length===4)setTimeout(()=>{if(n===PIN)onOk();else{setSh(true);setErr(true);setTimeout(()=>{setPin('');setSh(false)},600)}},150)};
  return(
    <div style={{minHeight:'100vh',background:'var(--ink)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',marginBottom:48}}>
        <div style={{fontFamily:'var(--serif)',fontSize:46,fontWeight:600,color:'#fffefb',letterSpacing:'-1px'}}>HotelTech<span style={{color:'var(--gold)'}}> 360</span></div>
        <div style={{fontSize:11,color:'rgba(255,254,251,.4)',marginTop:10,letterSpacing:'.25em',textTransform:'uppercase'}}>Novotel · Ibis Lyon Gerland</div>
      </div>
      <div style={{background:'rgba(255,254,251,.05)',padding:'40px 36px',width:'100%',maxWidth:320,borderRadius:'var(--r)',border:'1px solid rgba(184,150,90,.2)',boxShadow:'0 24px 60px rgba(0,0,0,.3)',animation:sh?'shake .4s ease':'none'}}>
        <div style={{fontSize:11,color:'rgba(255,254,251,.5)',letterSpacing:'.2em',textTransform:'uppercase',textAlign:'center',marginBottom:28}}>Code Technicien</div>
        <div style={{display:'flex',justifyContent:'center',gap:20,marginBottom:28}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:12,height:12,borderRadius:'50%',background:i<pin.length?(err?'#d4625c':'var(--gold)'):'rgba(255,254,251,.15)',transition:'all .2s'}}/>)}
        </div>
        {err&&<div style={{textAlign:'center',fontSize:12,color:'#d4625c',marginBottom:16}}>Code incorrect</div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>
            <button key={i} onClick={()=>k==='⌫'?setPin(p=>p.slice(0,-1)):k?press(k):null}
              style={{height:58,background:k?'rgba(255,254,251,.06)':'transparent',border:k?'1px solid rgba(255,254,251,.1)':'none',borderRadius:8,color:'#fffefb',fontSize:k==='⌫'?18:24,fontFamily:'var(--serif)',fontWeight:300}}>{k}</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══ DASHBOARD ════════════════════════════════════════════
function DashView({nav}){
  const[insps,setI]=useState([]);const[loading,setL]=useState(true);
  useEffect(()=>{
    fetchRemote(()=>{setI(merged());setL(false)});
    const iv=setInterval(()=>fetchRemote(()=>setI(merged())),60000);
    return()=>clearInterval(iv);
  },[]);
  const tod=insps.filter(i=>i.date===today());
  const urg=insps.filter(i=>i.problems&&i.problems!=='Aucun'&&!i.resolved);
  const critique=urg.filter(i=>i.priority==='critique');
  const recurring=(()=>{const m={};insps.filter(i=>i.problems&&i.problems!=='Aucun').forEach(i=>{const k=i.hotel+'_'+i.room;if(!m[k])m[k]={hotel:i.hotel,room:i.room,count:0};m[k].count++;});return Object.values(m).filter(r=>r.count>=2).sort((a,b)=>b.count-a.count);})();
  const resolve=id=>{const src=merged().find(function(i){return i.id===id;})||null;if(!src)return;const by=prompt('Résolu par :',ls.get('ht:lastTech')||'');if(by===null)return;const u={...src,resolved:true,resolvedAt:Date.now(),resolvedBy:by.trim()||'—'};ls.set('ht:'+u.id,u);sendToSheet(sheetPayload(u,'update'));const ri=_remote.findIndex(function(r){return r.hotel===u.hotel&&r.room===u.room&&r.date===u.date;});if(ri>=0)_remote[ri]=Object.assign({},_remote[ri],u);setI(merged())};
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{background:'linear-gradient(135deg,#1a2332 0%,#2d3f58 100%)',padding:'52px 20px 32px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-60,right:-60,width:200,height:200,borderRadius:'50%',background:'rgba(184,150,90,.07)'}}/>
        <div style={{position:'absolute',bottom:-30,left:10,width:100,height:100,borderRadius:'50%',background:'rgba(184,150,90,.04)'}}/>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:10,color:'rgba(255,254,251,.45)',letterSpacing:'.25em',textTransform:'uppercase',marginBottom:8}}>Novotel · Ibis Lyon Gerland</div>
            <div style={{fontFamily:'var(--serif)',fontSize:32,fontWeight:600,color:'#fffefb',lineHeight:1.1,marginBottom:4}}>Tableau de bord</div>
            <div style={{fontSize:13,color:'rgba(255,254,251,.45)',fontStyle:'italic'}}>{new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div>
          </div>
          <a href={SHEET_URL} target="_blank" rel="noopener noreferrer" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:12,padding:'10px 14px',textDecoration:'none',backdropFilter:'blur(8px)',flexShrink:0,marginTop:4,transition:'background .2s'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.15)'}
            onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.08)'}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#34a853" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
            </svg>
            <span style={{fontSize:9,fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(255,255,255,.7)'}}>Données</span>
          </a>
        </div>
      </div>
      <div style={{padding:'0 16px 20px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginTop:-22,marginBottom:24}}>
          <StatCard v={loading?'…':tod.length} l="Aujourd'hui" c="var(--ink)"/>
          <StatCard v={loading?'…':urg.length} l="À traiter" c={urg.length>0?'var(--red)':'var(--green)'} pulse={urg.length>0}/>
          <StatCard v={loading?'…':insps.length} l="Total" c="var(--gold)"/>
        </div>
        {critique.length>0&&(
          <div className="fade-in" style={{background:'var(--red)',borderRadius:'var(--r2)',padding:'14px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12,boxShadow:'0 4px 16px rgba(192,57,43,.3)'}}>
            <span style={{fontSize:22}}>🚨</span>
            <div><div style={{fontSize:12,fontWeight:700,color:'#fff',letterSpacing:'.1em',textTransform:'uppercase'}}>{critique.length} critique{critique.length>1?'s':''} — intervention immédiate</div></div>
          </div>
        )}
        {urg.length>0&&<><SL accent>À traiter</SL>{urg.slice(0,5).map(i=><UrgCard key={i.id} i={i} onClick={()=>{_currentInsp=i;nav('/i/'+i.id)}} onResolve={()=>resolve(i.id)}/>)}</>}
        {tod.length>0&&<><SL>Inspections du jour</SL>{tod.map(i=><Row key={i.id} i={i} onClick={()=>{_currentInsp=i;nav('/i/'+i.id)}}/>)}</>}
        {recurring.length>0&&<><SL>Chambres récurrentes</SL>{recurring.map(r=>(
          <div key={r.hotel+'_'+r.room} style={{background:'var(--surface)',borderRadius:'var(--r2)',border:'1px solid var(--line)',padding:'12px 16px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',boxShadow:'var(--sh1)'}}>
            <div><div style={{fontFamily:'var(--serif)',fontSize:16,fontWeight:600}}>Ch. {r.room} — {r.hotel}</div><div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Signalé {r.count} fois</div></div>
            <div style={{fontFamily:'var(--serif)',fontSize:26,fontWeight:600,color:'var(--gold)'}}>{r.count}×</div>
          </div>
        ))}</>}
        {loading&&[1,2,3].map(i=><SkelRow key={i}/>)}

// ═══ ANALYTICS ════════════════════════════════════════════
function AnalyticsView(){
  const[insps,setI]=useState([]);const[loading,setL]=useState(true);
  useEffect(()=>{fetchRemote(()=>{setI(merged());setL(false)})},[]);
  if(loading)return<div style={{minHeight:'100vh',background:'var(--bg)'}}><GHdr title="Analyses" sub="Chargement…"/><div style={{padding:'16px'}}>{[1,2,3].map(i=><SkelRow key={i}/>)}</div></div>;
  const byTech={};
  insps.forEach(i=>{if(!i.tech)return;if(!byTech[i.tech])byTech[i.tech]={name:i.tech,total:0,nok:0,times:[]};byTech[i.tech].total++;if(i.problems&&i.problems!=='Aucun')byTech[i.tech].nok++;if(i.resolved&&i.resolvedAt&&i.ts)byTech[i.tech].times.push(i.resolvedAt-i.ts);});
  const techs=Object.values(byTech).sort((a,b)=>b.total-a.total);
  const weeks=Array.from({length:6},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(5-i)*7);
    const s=new Date(d);s.setDate(s.getDate()-s.getDay());
    const e=new Date(s);e.setDate(e.getDate()+6);
    return{label:'S'+(i+1),count:insps.filter(x=>{const xd=new Date(x.date+'T12:00:00');return xd>=s&&xd<=e;}).length};
  });
  const maxW=Math.max(...weeks.map(w=>w.count),1);
  const prioStats=PRIOS.map(p=>({...p,count:insps.filter(i=>i.priority===p.id).length}));
  const totalPrio=prioStats.reduce((s,p)=>s+p.count,0);
  const rate=insps.length>0?Math.round((insps.filter(i=>!i.problems||i.problems==='Aucun').length/insps.length)*100):0;
  const unresolved=insps.filter(i=>i.problems&&i.problems!=='Aucun'&&!i.resolved).length;
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      <GHdr title="Analyses" sub={insps.length+' inspections'}/>
      <div style={{padding:'16px 16px 80px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          <KPI label="Conformité" value={rate+'%'} color={rate>80?'var(--green)':rate>60?'var(--orange)':'var(--red)'}/>
          <KPI label="Non résolus" value={unresolved} color={unresolved>0?'var(--red)':'var(--green)'}/>
        </div>
        <Crd style={{marginBottom:12}}>
          <CrdT>Inspections par semaine</CrdT>
          <div style={{display:'flex',alignItems:'flex-end',gap:6,height:80,marginTop:14}}>
            {weeks.map(w=>(
              <div key={w.label} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{fontSize:10,color:'var(--ink)',fontWeight:600}}>{w.count||''}</div>
                <div style={{width:'100%',background:'var(--ink)',borderRadius:'3px 3px 0 0',height:w.count?Math.max((w.count/maxW)*60,4):2,opacity:w.count?1:.15,transition:'height .5s'}}/>
                <div style={{fontSize:9,color:'var(--muted)'}}>{w.label}</div>
              </div>
            ))}
          </div>
        </Crd>
        {totalPrio>0&&<Crd style={{marginBottom:12}}>
          <CrdT>Priorités des problèmes</CrdT>
          <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:10}}>
            {prioStats.filter(p=>p.count>0).map(p=>(
              <div key={p.id}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:12,fontWeight:600,color:p.color}}>{p.label}</span><span style={{fontSize:12,color:'var(--ink2)'}}>{p.count}</span></div>
                <div style={{height:6,background:'var(--line)',borderRadius:3}}><div style={{height:'100%',background:p.color,borderRadius:3,width:(p.count/totalPrio*100)+'%',transition:'width .5s'}}/></div>
              </div>
            ))}
          </div>
        </Crd>}
        <Crd style={{marginBottom:12}}>
          <CrdT>Par hôtel</CrdT>
          <div style={{display:'flex',gap:10,marginTop:12}}>
            {['Novotel','Ibis'].map(h=>{const t=insps.filter(i=>i.hotel===h).length,n=insps.filter(i=>i.hotel===h&&i.problems&&i.problems!=='Aucun').length;return(
              <div key={h} style={{flex:1,background:'var(--bg)',borderRadius:'var(--r2)',padding:'14px',textAlign:'center'}}>
                <div style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:600}}>{t}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{h}</div>
                {n>0&&<div style={{fontSize:10,color:'var(--red)',marginTop:4}}>{n} prob.</div>}
              </div>
            );})}
          </div>
        </Crd>
        {techs.length>0&&<Crd>
          <CrdT>Techniciens</CrdT>
          <div style={{marginTop:12}}>
            {techs.map((t,idx)=>{
              const avg=t.times.length?Math.round(t.times.reduce((a,b)=>a+b,0)/t.times.length):null;
              const r=t.total>0?Math.round(((t.total-t.nok)/t.total)*100):0;
              return(
                <div key={t.name} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:idx<techs.length-1?'1px solid var(--line)':'none'}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:600,flexShrink:0}}>{t.name.charAt(0).toUpperCase()}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{t.name}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{t.total} inspection{t.total>1?'s':''}{avg?' · moy. '+fmtDur(avg):''}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:15,fontWeight:700,color:r>90?'var(--green)':r>70?'var(--gold)':'var(--red)'}}>{r}%</div>
                    <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>conforme</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Crd>}
      </div>
    </div>
  );
}

            {insp.resolvedAt&&<div><div style={{fontSize:8,color:'#888',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:2}}>Résolu le</div><div style={{fontSize:12,fontWeight:'bold',color:'#27634f'}}>{new Date(insp.resolvedAt).toLocaleString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>}

            <div style={{fontSize:8,letterSpacing:'0.2em',textTransform:'uppercase',color:'#999',marginBottom:6}}>Commentaires</div>

        <div style={{background:'#1a2332',padding:'7px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

// ═══ EDIT ═════════════════════════════════════════════════
function EditView({id,nav}){
  const[insp,setI]=useState(null);
  useEffect(()=>{
    const x=ls.get('ht:'+id)||_currentInsp||_inspMap[id]||(_remote.length?_remote.find(function(r){return r.id===id;})||null:null);
    if(x){setI(x);return;}
    fetchRemote(function(){
      const y=_currentInsp||_inspMap[id]||_remote.find(function(r){return r.id===id;})||null;
      setI(y);
    });
  },[id]);
  if(!insp)return<div style={{padding:40,textAlign:'center',color:'var(--muted)'}}>Chargement…</div>;
  const u=(f,v)=>setI(p=>({...p,[f]:v}));
  const uc=(k,v)=>setI(p=>({...p,checks:{...p.checks,[k]:(p.checks&&p.checks[k]===v)?undefined:v}}));
  const save=()=>{
    const nok=Object.entries(insp.checks||{}).filter(([,v])=>v==='nok').map(([k])=>{const found=ALL.find(i=>i.id===k);return found?found.label:null;}).filter(Boolean);
    const updated={...insp,problems:nok.length?nok.join(' · '):'Aucun',editedAt:Date.now()};
    ls.set('ht:'+insp.id||id,updated);sendToSheet(sheetPayload(updated,'update'));nav('/i/'+id);
  };
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{background:'var(--ink)',padding:'52px 16px 20px'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <IBtn onClick={()=>nav('/i/'+id)} light>←</IBtn>
          <div><div style={{fontSize:10,color:'rgba(255,254,251,.5)',letterSpacing:'.2em',textTransform:'uppercase'}}>{insp.hotel}</div><div style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:600,color:'#fffefb'}}>Modifier — Ch. {insp.room}</div></div>
        </div>
      </div>
      <div style={{padding:'16px 16px 80px'}}>
        <Crd style={{marginBottom:12}}><FL>Technicien</FL><input style={inp()} value={insp.tech} onChange={e=>u('tech',e.target.value)}/></Crd>
        {SECTIONS.map(sec=>(
          <div key={sec.id} style={{marginTop:14}}>
            <div style={{fontFamily:'var(--serif)',fontSize:16,fontWeight:600,marginBottom:8}}><span style={{fontStyle:'italic',color:'var(--gold)',marginRight:8}}>{sec.num}</span>{sec.label}</div>
            {sec.items.map(item=>{
              const v=insp.checks?.[item.id];
              return<div key={item.id} style={{background:'var(--surface)',border:'1px solid '+(v==='nok'?'var(--red)':v==='ok'?'var(--green)':'var(--line)'),borderLeft:'3px solid '+(v==='nok'?'var(--red)':v==='ok'?'var(--green)':'var(--line)'),borderRadius:'var(--r2)',padding:'10px 14px',marginBottom:6,boxShadow:'var(--sh1)'}}>
                <div style={{fontSize:13,marginBottom:8}}>{item.label}</div>
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>uc(item.id,'ok')} style={{flex:1,padding:'7px',border:'1px solid '+(v==='ok'?'var(--green)':'var(--line)'),borderRadius:6,background:v==='ok'?'var(--green2)':'transparent',color:v==='ok'?'var(--green)':'var(--muted)',fontSize:11}}>✓ Conforme</button>
                  <button onClick={()=>uc(item.id,'nok')} style={{flex:1,padding:'7px',border:'1px solid '+(v==='nok'?'var(--red)':'var(--line)'),borderRadius:6,background:v==='nok'?'var(--red2)':'transparent',color:v==='nok'?'var(--red)':'var(--muted)',fontSize:11}}>✗ Non conforme</button>
                  <button onClick={()=>uc(item.id,'na')} style={{flex:1,padding:'7px',border:'1px solid '+(v==='na'?'var(--ink2)':'var(--line)'),borderRadius:6,background:v==='na'?'#eee':'transparent',color:v==='na'?'var(--ink2)':'var(--muted)',fontSize:11}}>— N/A</button>
                </div>
              </div>;
            })}
          </div>
        ))}
        <Crd style={{marginTop:14,marginBottom:10}}><FL>Commentaires</FL><textarea style={{...inp(),minHeight:70,resize:'vertical',lineHeight:1.5}} value={insp.comments||''} onChange={e=>u('comments',e.target.value)}/></Crd>
        <div style={{display:'flex',gap:10,marginTop:14}}>
          <button style={{...btn2(),flex:1}} onClick={()=>nav('/i/'+id)}>Annuler</button>
          <button style={{...btn(),flex:1}} onClick={save}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

// ═══ HISTORY ══════════════════════════════════════════════
function HistView({nav}){
  const[insps,setI]=useState([]);const[f,setF]=useState('all');
  const[byFloor,setByFloor]=useState(false);const[sm,setSM]=useState(false);const[sel,setSel]=useState(new Set());
  useEffect(()=>{
    fetchRemote(()=>setI(merged()));
    const iv=setInterval(()=>fetchRemote(()=>setI(merged())),60000);
    return()=>clearInterval(iv);
  },[]);
  const filtered=f==='open'?insps.filter(i=>i.problems&&i.problems!=='Aucun'&&!i.resolved):f==='done'?insps.filter(i=>i.resolved):insps;
  const delOne=insp=>{sendToSheet({action:'delete',room:insp.room,hotel:insp.hotel,date:insp.date});ls.del('ht:'+insp.id);_remote=_remote.filter(r=>!(r.hotel===insp.hotel&&r.room===insp.room&&r.date===insp.date));setI(merged());};
  const delSel=()=>{if(!sel.size||!confirm('Supprimer '+sel.size+' inspection(s) ?'))return;insps.filter(i=>sel.has(i.id)).forEach(delOne);setSel(new Set());setSM(false);};
  const toggle=id=>setSel(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n});
  const grouped=byFloor?(()=>{const g={};filtered.forEach(i=>{const fl=floorOf(i.room);if(!g[fl])g[fl]=[];g[fl].push(i)});return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0]));})():null;
  const renderRow=i=>sm
    ?<div key={i.id} style={{display:'flex',alignItems:'stretch',marginBottom:7}}>
        <div onClick={()=>toggle(i.id)} style={{width:46,flexShrink:0,background:sel.has(i.id)?'var(--ink)':'var(--surface)',border:'1px solid '+(sel.has(i.id)?'var(--ink)':'var(--line)'),borderRight:'none',borderRadius:'var(--r2) 0 0 var(--r2)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
          <span style={{color:sel.has(i.id)?'#fff':'var(--line)',fontSize:18}}>{sel.has(i.id)?'✓':'○'}</span>
        </div>
        <div style={{flex:1,marginBottom:-7}} onClick={()=>toggle(i.id)}><Row i={i} onClick={()=>{}}/></div>
      </div>
    :<Row key={i.id} i={i} onClick={()=>{_currentInsp=i;nav('/i/'+i.id)}} onDelete={()=>delOne(i)}/>;
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--line)',padding:'52px 16px 14px',position:'sticky',top:0,zIndex:10,boxShadow:'var(--sh1)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div>
            <div style={{fontSize:10,color:'var(--muted)',letterSpacing:'.25em',textTransform:'uppercase',marginBottom:4}}>Archives</div>
            <div style={{fontFamily:'var(--serif)',fontSize:24,fontWeight:600}}>Historique <span style={{fontSize:14,color:'var(--muted)',fontWeight:400}}>({insps.length})</span></div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setByFloor(!byFloor)} style={{height:34,padding:'0 12px',background:byFloor?'var(--ink)':'var(--surface)',border:'1px solid var(--line)',borderRadius:8,color:byFloor?'#fff':'var(--ink2)',fontSize:11,fontWeight:500,transition:'all .2s'}}>Étage</button>
            <button onClick={()=>{setSM(!sm);setSel(new Set())}} style={{width:34,height:34,background:sm?'var(--ink)':'var(--surface)',border:'1px solid var(--line)',borderRadius:8,color:sm?'#fff':'var(--ink2)',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}>{sm?'✕':'☑'}</button>
          </div>
        </div>
        <div style={{display:'flex',gap:4,padding:3,background:'var(--bg)',borderRadius:8,border:'1px solid var(--line)'}}>
          {[['all','Toutes'],['open','À traiter'],['done','Résolues']].map(([v,l])=>
            <button key={v} onClick={()=>setF(v)} style={{flex:1,padding:'7px',background:f===v?'var(--surface)':'transparent',border:'none',borderRadius:6,color:f===v?'var(--ink)':'var(--ink2)',fontSize:11,fontWeight:f===v?600:400,boxShadow:f===v?'var(--sh1)':'none',transition:'all .2s'}}>{l}</button>
          )}
        </div>
      </div>
      <div style={{padding:'12px 16px 20px'}}>
        {sm&&<div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',background:'var(--surface)',borderRadius:'var(--r2)',padding:'10px 12px',border:'1px solid var(--line)',boxShadow:'var(--sh1)'}}>
          <button onClick={()=>setSel(new Set(filtered.map(i=>i.id)))} style={{fontSize:11,color:'var(--ink2)',background:'none',border:'1px solid var(--line)',borderRadius:6,padding:'5px 10px'}}>Tout</button>
          <button onClick={()=>setSel(new Set())} style={{fontSize:11,color:'var(--ink2)',background:'none',border:'1px solid var(--line)',borderRadius:6,padding:'5px 10px'}}>Aucun</button>
          <div style={{flex:1,fontSize:12,color:'var(--muted)',textAlign:'center'}}>{sel.size} sél.</div>
          <button onClick={delSel} disabled={!sel.size} style={{fontSize:11,background:sel.size?'var(--red)':'var(--line)',border:'none',borderRadius:6,color:sel.size?'#fff':'var(--muted)',padding:'5px 12px'}}>🗑 Supprimer</button>
        </div>}
        {filtered.length===0&&<div style={{textAlign:'center',padding:'60px 20px'}}><div style={{fontSize:40,marginBottom:12}}>📋</div><div style={{fontStyle:'italic',color:'var(--muted)'}}>Aucune inspection</div></div>}
        {grouped
          ?grouped.map(([floor,items])=>(
            <div key={floor}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.2em',textTransform:'uppercase',marginBottom:8,marginTop:16,paddingBottom:6,borderBottom:'1px solid var(--line)'}}>{floor} <span style={{fontWeight:400,color:'var(--ink2)'}}>({items.length})</span></div>
              {items.map(renderRow)}
            </div>
          ))
          :filtered.map(renderRow)
        }
      </div>
    </div>
  );
}

      <div style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:600,color:'#fffefb'}}>{title}</div>
      {sub&&<div style={{fontSize:12,color:'rgba(255,254,251,.5)',marginTop:4,fontStyle:'italic'}}>{sub}</div>}
    </div>
  );
}

function StatCard({v,l,c,pulse}){return<div style={{background:'var(--surface)',borderRadius:'var(--r2)',border:'1px solid var(--line)',padding:'14px 10px',textAlign:'center',boxShadow:'var(--sh2)'}}><div className={pulse?'pulse':''} style={{fontFamily:'var(--serif)',fontSize:30,fontWeight:600,color:c,lineHeight:1}}>{v}</div><div style={{fontSize:9,color:'var(--muted)',letterSpacing:'.15em',textTransform:'uppercase',marginTop:5}}>{l}</div></div>}

function InfoCrd({label,value}){return<Crd style={{marginBottom:10}}><div style={{fontSize:10,color:'var(--muted)',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:6}}>{label}</div><div style={{fontSize:14,lineHeight:1.6}}>{value}</div></Crd>}
function SChip({v}){

function SkelRow(){return<div style={{background:'var(--surface)',borderRadius:'var(--r2)',border:'1px solid var(--line)',padding:'14px 16px',marginBottom:8,boxShadow:'var(--sh1)'}}><div className="skel" style={{height:14,width:'55%',marginBottom:8}}/><div className="skel" style={{height:10,width:'35%'}}/></div>}

          </div>
          {onDelete&&<button onClick={e=>{e.stopPropagation();if(confirm('Supprimer ?'))onDelete()}} style={{background:'var(--red2)',border:'1px solid var(--red)',borderRadius:6,color:'var(--red)',width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,cursor:'pointer',flexShrink:0}}>🗑</button>}
        </div>
      </div>
      {hasP&&<div style={{fontSize:12,color:'var(--red)',marginTop:6,lineHeight:1.6}}>{fmtProblems(i.problems)}</div>}

}
function IBtn({children,onClick,light,title}){return<button onClick={onClick} title={title} style={{width:36,height:36,background:light?'rgba(255,254,251,.08)':'var(--surface)',border:'1px solid '+(light?'rgba(255,254,251,.15)':'var(--line)'),borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,color:light?'#fffefb':'var(--ink2)',flexShrink:0}}>{children}</button>}

// ═══ SIGNATURE PAD ════════════════════════════════════════
function SigPad({onChange}){
  const can=useRef(null);const drawing=useRef(false);const[signed,setSigned]=useState(false);
  useEffect(()=>{
    const c=can.current;if(!c)return;
    const r=c.getBoundingClientRect();
    c.width=Math.round(r.width)||440;c.height=130;
  },[]);
  const pos=(e,c)=>{
    const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
    return{x:(t.clientX-r.left)*(c.width/r.width),y:(t.clientY-r.top)*(c.height/r.height)};
  };
  const start=e=>{drawing.current=true;const c=can.current,ctx=c.getContext('2d'),p=pos(e,c);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault()};
  const move=e=>{if(!drawing.current)return;const c=can.current,ctx=c.getContext('2d'),p=pos(e,c);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#1a2332';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();e.preventDefault()};
  const end=()=>{if(!drawing.current)return;drawing.current=false;setSigned(true);onChange(can.current.toDataURL())};
  const clear=()=>{const c=can.current;c.getContext('2d').clearRect(0,0,c.width,c.height);setSigned(false);onChange(null)};
  return(
    <div style={{marginTop:4}}>
      <canvas ref={can}
        style={{border:'2px solid '+(signed?'var(--green)':'var(--line)'),borderRadius:'var(--r2)',background:'#fafaf8',touchAction:'none',width:'100%',height:130,display:'block',cursor:'crosshair',transition:'border-color .2s'}}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
        <span style={{fontSize:11,color:signed?'var(--green)':'var(--muted)',fontStyle:'italic'}}>{signed?'✓ Signature enregistrée':'Signez dans le cadre ci-dessus'}</span>
        {signed&&<button onClick={clear} style={{fontSize:11,color:'var(--red)',background:'none',border:'none',padding:0,cursor:'pointer'}}>✕ Effacer</button>}
      </div>
    </div>
  );
}
